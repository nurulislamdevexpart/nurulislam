    --green-deep:#0b3d33; --green:#0d5c4d; --green-soft:#e4efe9;
    --gold:#c99a3f; --gold-soft:#f3e6c8; --danger:#b3402f;
    --line:rgba(15,46,40,0.14); --shadow:0 10px 30px -12px rgba(11,61,51,0.28);
    --radius:16px; --radius-sm:10px;
  }
  [data-theme="dark"]{
    --ink:#eef2f0; --paper:#0b1512; --paper-2:#122019;
    --green-deep:#0e2b24; --green:#1e7c67; --green-soft:#132a23;
    --gold:#e0b158; --gold-soft:#26200f; --danger:#e08170;
    --line:rgba(238,242,240,0.12); --shadow:0 10px 30px -12px rgba(0,0,0,0.6);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Hind Siliguri', system-ui, sans-serif;
    background:var(--paper); color:var(--ink); min-height:100vh;
    transition:background .25s ease, color .25s ease; padding-bottom:100px;
  }
  .stamp-band{ height:6px; background:repeating-linear-gradient(90deg, var(--gold) 0 18px, var(--green) 18px 36px); }
  header.top{

  header.top::after{ content:""; position:absolute; right:-40px; top:-40px; width:180px; height:180px; border-radius:50%; border:1.5px solid rgba(244,239,224,0.18); }

  .brand-row{display:flex; align-items:center; gap:12px; position:relative; z-index:1;}
  .seal{ width:52px;height:52px;border-radius:50%; background:radial-gradient(circle at 32% 28%, var(--gold), #8a6420 78%); display:flex;align-items:center;justify-content:center; font-weight:700; color:#241c07; font-size:20px; box-shadow:0 4px 14px rgba(0,0,0,.35); flex:none; }
  .brand-text .bank-name{font-family:'Tiro Bangla', serif; font-size:1.5rem; font-weight:700; line-height:1.25; letter-spacing:.2px;}
  .brand-text .bank-sub{font-size:.92rem; opacity:.85; margin-top:2px;}
  .eyebrow{ display:inline-block; margin-top:14px; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); border:1px solid rgba(201,154,63,.5); padding:3px 10px; border-radius:999px; position:relative; z-index:1; }
  .top-actions{position:absolute; top:20px; left:18px; display:flex; gap:8px; z-index:2;}
  .icon-btn{ width:36px;height:36px; border-radius:50%; border:1px solid rgba(244,239,224,.35); background:rgba(255,255,255,.08); color:#f4efe0; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; }
  .icon-btn:active{transform:scale(.94);}
  .install-btn{ position:absolute; top:20px; right:18px; z-index:2; display:none; align-items:center; gap:6px; font-size:.75rem; padding:7px 12px; border-radius:999px; border:1px solid rgba(244,239,224,.4); background:rgba(255,255,255,.1); color:#f4efe0; cursor:pointer; }

  main{max-width:640px; margin:0 auto; padding:0 16px;}

  .stats-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:-30px; position:relative; z-index:3; }
  .stat-card{ background:var(--paper-2); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); border:1px solid var(--line); }
  .stat-card .num{font-size:1.6rem; font-weight:700; color:var(--green);}
  [data-theme="dark"] .stat-card .num{color:var(--gold);}
  .stat-card .lab{font-size:.78rem; opacity:.75; margin-top:2px;}

  .search-wrap{margin-top:18px; position:relative;}
  .search-wrap input{ width:100%; padding:14px 44px 14px 44px; border-radius:999px; border:1.5px solid var(--line); background:var(--paper-2); color:var(--ink); font-size:1rem; font-family:inherit; outline:none; }
  .search-wrap input:focus{border-color:var(--gold);}
  .search-icon{position:absolute; left:16px; top:50%; transform:translateY(-50%); opacity:.55; font-size:1.05rem;}
  .clear-btn{ position:absolute; right:10px; top:50%; transform:translateY(-50%); width:26px;height:26px;border-radius:50%; border:none; background:var(--green-soft); color:var(--green); cursor:pointer; display:none; align-items:center; justify-content:center; }
  [data-theme="dark"] .clear-btn{color:var(--gold);}
  .search-hint{font-size:.72rem; opacity:.55; margin:6px 4px 0;}

  .filter-row{display:flex; gap:8px; overflow-x:auto; margin-top:12px; padding-bottom:4px; -webkit-overflow-scrolling:touch;}
  .filter-row::-webkit-scrollbar{display:none;}
  .chip{ flex:none; padding:7px 14px; border-radius:999px; font-size:.82rem; border:1px solid var(--line); background:var(--paper-2); color:var(--ink); opacity:.8; cursor:pointer; white-space:nowrap; }
  .chip.active{background:var(--green); color:#fff; border-color:var(--green); opacity:1;}
  [data-theme="dark"] .chip.active{background:var(--gold); color:#241c07; border-color:var(--gold);}

  .result-meta{margin:16px 2px 8px; font-size:.85rem; opacity:.65; display:flex; justify-content:space-between; align-items:center;}
  .branch-toggle{font-size:.8rem; color:var(--green); cursor:pointer; font-weight:600;}
  [data-theme="dark"] .branch-toggle{color:var(--gold);}

  .branch-group{margin-bottom:14px;}
  .branch-head{ display:flex; align-items:center; gap:8px; padding:10px 4px; font-weight:600; font-size:.95rem; color:var(--green-deep); border-bottom:1px dashed var(--line); }
  [data-theme="dark"] .branch-head{color:var(--gold);}
  .branch-head .code{font-size:.72rem; font-weight:500; opacity:.6;}
  .branch-head .count{ margin-left:auto; font-size:.75rem; background:var(--gold-soft); color:var(--green-deep); padding:2px 9px; border-radius:999px; font-weight:600; }
  [data-theme="dark"] .branch-head .count{color:var(--gold);}

  .emp-card{ display:flex; align-items:center; gap:12px; background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 14px; margin:8px 0; cursor:pointer; transition:transform .12s ease; }
  .emp-card:active{transform:scale(.985);}
  .avatar{ width:42px; height:42px; border-radius:50%; flex:none; background:linear-gradient(150deg, var(--green), var(--green-deep)); color:#f4efe0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; }
  .emp-info{flex:1; min-width:0;}
  .emp-name{font-weight:600; font-size:1rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .emp-role{font-size:.82rem; opacity:.7; margin-top:1px;}
  .emp-pf{font-size:.72rem; opacity:.55; margin-top:2px;}
  .call-quick{ flex:none; width:38px; height:38px; border-radius:50%; border:none; background:var(--green-soft); color:var(--green); display:flex; align-items:center; justify-content:center; font-size:1.1rem; text-decoration:none; }
  [data-theme="dark"] .call-quick{color:var(--gold); background:var(--gold-soft);}

  .empty-state{text-align:center; padding:50px 20px; opacity:.6;}

  .fab{

    background:linear-gradient(150deg, var(--gold), #a97f2e); color:#241c07; border:none;
    font-size:1.7rem; box-shadow:0 10px 26px -6px rgba(0,0,0,.4); cursor:pointer; z-index:40;

  .overlay{ position:fixed; inset:0; background:rgba(11,21,18,.55); display:none; align-items:flex-end; z-index:50; backdrop-filter:blur(2px); }
  .overlay.show{display:flex;}
  .sheet{ background:var(--paper-2); width:100%; max-width:640px; margin:0 auto; border-radius:22px 22px 0 0; padding:22px 20px 26px; max-height:90vh; overflow-y:auto; box-shadow:0 -10px 40px rgba(0,0,0,.35); animation:slideUp .22s ease; }
  @keyframes slideUp{from{transform:translateY(30px); opacity:.4;} to{transform:translateY(0); opacity:1;}}

  .sheet-head{display:flex; align-items:center; gap:14px;}

  .sheet-role{font-size:.9rem; color:var(--green); font-weight:600; margin-top:2px;}

  .sheet-title{font-size:1.15rem; font-weight:700; margin-bottom:14px;}

  .detail-grid{margin-top:18px; display:flex; flex-direction:column; gap:0;}

  .detail-row .v{font-weight:600; text-align:right;}

  .action-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:20px;}
  .action-btn{ display:flex; flex-direction:column; align-items:center; gap:5px; padding:12px 4px; border-radius:14px; border:1px solid var(--line); background:var(--paper); color:var(--ink); text-decoration:none; font-size:.72rem; cursor:pointer; }

  .action-btn.danger{color:var(--danger); border-color:var(--danger);}

  .form-field input{ width:100%; padding:11px 13px; border-radius:10px; border:1.5px solid var(--line); background:var(--paper); color:var(--ink); font-size:.95rem; font-family:inherit; outline:none; }
  .form-field input:focus{border-color:var(--gold);}
  .form-field .hint{font-size:.7rem; opacity:.5; margin-top:4px;}
  .form-actions{display:flex; gap:10px; margin-top:18px;}
  .form-actions button{ flex:1; padding:13px; border-radius:12px; border:none; font-family:inherit; font-size:.95rem; font-weight:600; cursor:pointer; }
  .btn-save{background:var(--green); color:#fff;}
  [data-theme="dark"] .btn-save{background:var(--gold); color:#241c07;}
  .btn-cancel{background:var(--paper); border:1.5px solid var(--line) !important; color:var(--ink);}
  .btn-delete-row{margin-top:10px; text-align:center; color:var(--danger); font-size:.85rem; cursor:pointer; padding:8px;}

  .confirm-box p{font-size:.95rem; margin:10px 0 18px;}
  .confirm-actions{display:flex; gap:10px;}
  .confirm-actions button{flex:1; padding:11px; border-radius:10px; border:none; font-family:inherit; font-weight:600; cursor:pointer;}

  .toast{ position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green-deep); color:#f4efe0; padding:10px 18px; border-radius:999px; font-size:.85rem; opacity:0; transition:all .25s ease; z-index:60; pointer-events:none; max-width:88%; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  footer.app-footer{ text-align:center; margin-top:30px; padding:18px 0 4px; font-size:.78rem; opacity:.55; }
  footer.app-footer b{color:var(--green);}
  [data-theme="dark"] footer.app-footer b{color:var(--gold);}
</style>

// ---------- persistence (localStorage) ----------
const STORAGE_KEY = 'kb_madaripur_dir_v1';
function loadStore(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {edits:{}, deletes:[], adds:[]};
    return JSON.parse(raw);
  }catch(e){ return {edits:{}, deletes:[], adds:[]}; }
}
function saveStore(store){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); }catch(e){}
}
let store = loadStore();

function getAllEmployees(){
  let list = BASE_EMPLOYEES
    .filter(e=>!store.deletes.includes(e.id))
    .map(e=> store.edits[e.id] ? store.edits[e.id] : e);
  list = list.concat(store.adds.filter(e=>!store.deletes.includes(e.id)));
  return list;
}

let state = { query:"", filter:"all", grouped:true };

const listArea = document.getElementById('listArea');
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearSearch');
const filterRow = document.getElementById('filterRow');
const resultCount = document.getElementById('resultCount');
const groupToggle = document.getElementById('groupToggle');
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');
const toastEl = document.getElementById('toast');

function renderChips(){
  const employees = getAllEmployees();
  const branches = [...new Set(employees.map(e=>e.branch))].sort();
  let html = `<div class="chip ${state.filter==='all'?'active':''}" data-b="all">সব শাখা</div>`;
  branches.forEach(b=>{
    html += `<div class="chip ${state.filter===b?'active':''}" data-b="${b}">${b.replace(' Branch','')}</div>`;
  });
  filterRow.innerHTML = html;
  filterRow.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click', ()=>{ state.filter = c.dataset.b; render(); });
  });
}

function initials(name){
  const parts = name.replace(/[.]/g,'').split(' ').filter(Boolean);
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[1][0]).toUpperCase();
}

function esc(s){
  return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function matches(e, q){
  if(!q) return true;
  q = q.toLowerCase();
  return e.name.toLowerCase().includes(q) ||
         e.pf.toLowerCase().includes(q) ||
         e.desig.toLowerCase().includes(q) ||
         e.branch.toLowerCase().includes(q) ||
         (e.branchCode||'').toLowerCase().includes(q) ||
         e.phones.some(p=>p.includes(q));
}

function getFiltered(){
  return getAllEmployees().filter(e=>{
    const okBranch = state.filter==='all' || e.branch===state.filter;
    return okBranch && matches(e, state.query);
  });
}

function cardHTML(e){
  return `<div class="emp-card" data-id="${esc(e.id)}">
    <div class="avatar">${initials(e.name)}</div>
    <div class="emp-info">
      <div class="emp-name">${esc(e.name)}</div>
      <div class="emp-role">${esc(e.desig)} · ${esc(e.branch.replace(' Branch',''))}${e.branchCode?(' · '+esc(e.branchCode)):''}</div>
      <div class="emp-pf">PF: ${esc(e.pf)}</div>
    </div>
    <a class="call-quick" href="tel:${esc(e.phones[0])}" onclick="event.stopPropagation()" title="কল করুন">📞</a>
  </div>`;
}

function render(){
  renderChips();
  const all = getAllEmployees();
  document.getElementById('statEmp').textContent = all.length;
  document.getElementById('statBranch').textContent = [...new Set(all.map(e=>e.branch))].length;

  const filtered = getFiltered();
  resultCount.textContent = state.query || state.filter!=='all'
    ? `${filtered.length} জন পাওয়া গেছে`
    : `সব কর্মকর্তা (${filtered.length})`;
  groupToggle.textContent = state.grouped ? 'তালিকা আকারে দেখুন' : 'শাখা অনুযায়ী দেখুন';

  if(filtered.length===0){
    listArea.innerHTML = `<div class="empty-state"><div class="glyph">🔍</div>কোনো তথ্য পাওয়া যায়নি<br>ভিন্ন কিছু লিখে আবার চেষ্টা করুন</div>`;
    return;
  }

  if(state.grouped){
    const byBranch = {};
    filtered.forEach((e)=>{ (byBranch[e.branch] = byBranch[e.branch]||[]).push(e); });
    let html = '';
    Object.keys(byBranch).sort().forEach(b=>{
      const codeSample = byBranch[b].find(x=>x.branchCode)?.branchCode || '';
      html += `<div class="branch-group"><div class="branch-head">🏦 ${esc(b)} ${codeSample?('<span class="code">('+esc(codeSample)+')</span>'):''}<span class="count">${byBranch[b].length}</span></div>`;
      byBranch[b].forEach(e=>{ html += cardHTML(e); });
      html += `</div>`;
    });
    listArea.innerHTML = html;
  } else {
    listArea.innerHTML = filtered.map(e=>cardHTML(e)).join('');
  }

  listArea.querySelectorAll('.emp-card').forEach(c=>{
    c.addEventListener('click', ()=>{
      const emp = getAllEmployees().find(x=>x.id===c.dataset.id);
      if(emp) openViewSheet(emp);
    });
  });
}

// ---------- view sheet ----------
function openViewSheet(e){
  const phonesRow = e.phones.map((p,i)=>`<div class="detail-row"><span class="k">ফোন ${e.phones.length>1?(i+1):''}</span><span class="v">${esc(p)}</span></div>`).join('');
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-avatar">${initials(e.name)}</div>
      <div><div class="sheet-name">${esc(e.name)}</div><div class="sheet-role">${esc(e.desig)}</div></div>
    </div>
    <div class="detail-grid">
      <div class="detail-row"><span class="k">PF Index</span><span class="v">${esc(e.pf)}</span></div>
      <div class="detail-row"><span class="k">শাখা</span><span class="v">${esc(e.branch)}</span></div>
      <div class="detail-row"><span class="k">শাখা কোড</span><span class="v ${e.branchCode?'':'empty'}">${e.branchCode?esc(e.branchCode):'যোগ করা হয়নি'}</span></div>
      <div class="detail-row"><span class="k">জেলা</span><span class="v">${esc(e.district)}</span></div>
      ${phonesRow}
    </div>
    <div class="action-grid">
      <a class="action-btn primary" href="tel:${esc(e.phones[0])}"><span class="ic">📞</span>কল</a>
      <a class="action-btn" href="sms:${esc(e.phones[0])}"><span class="ic">💬</span>এসএমএস</a>
      <div class="action-btn" id="copyBtn"><span class="ic">📋</span>কপি</div>
      <div class="action-btn" id="shareBtn"><span class="ic">📤</span>শেয়ার</div>
    </div>
    <div class="action-grid" style="grid-template-columns:1fr 1fr; margin-top:10px;">
      <div class="action-btn" id="editBtn"><span class="ic">✏️</span>এডিট</div>
      <div class="action-btn danger" id="deleteBtn"><span class="ic">🗑️</span>ডিলিট</div>
    </div>
  `;
  overlay.classList.add('show');

  sheet.querySelector('#copyBtn').addEventListener('click', ()=>{
    navigator.clipboard?.writeText(e.phones[0]);
    showToast('নম্বর কপি হয়েছে');
  });
  sheet.querySelector('#shareBtn').addEventListener('click', async ()=>{
    const text = `${e.name}\n${e.desig}\n${e.branch}${e.branchCode?(' ('+e.branchCode+')'):''}\nফোন: ${e.phones.join(', ')}\nPF Index: ${e.pf}`;
    if(navigator.share){ try{ await navigator.share({title:e.name, text}); }catch(err){} }
    else { navigator.clipboard?.writeText(text); showToast('তথ্য কপি হয়েছে (শেয়ার সাপোর্ট নেই)'); }
  });
  sheet.querySelector('#editBtn').addEventListener('click', ()=> openFormSheet(e));
  sheet.querySelector('#deleteBtn').addEventListener('click', ()=> confirmDelete(e));
}

// ---------- add/edit form sheet ----------
function openFormSheet(existing){
  const isEdit = !!existing;
  const e = existing || {id:'', pf:'', name:'', desig:'', branch:'', branchCode:'', phones:['']};
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${isEdit? '✏️ কর্মকর্তার তথ্য এডিট করুন' : '➕ নতুন কর্মকর্তা যোগ করুন'}</div>
    <div class="form-field"><label>PF Index *</label><input id="f_pf" value="${esc(e.pf)}" placeholder="যেমন: S-1234"></div>
    <div class="form-field"><label>নাম *</label><input id="f_name" value="${esc(e.name)}" placeholder="পূর্ণ নাম লিখুন"></div>
    <div class="form-field"><label>পদবি (Designation) *</label><input id="f_desig" value="${esc(e.desig)}" placeholder="যেমন: Officer"></div>
    <div class="form-field"><label>শাখার নাম *</label><input id="f_branch" value="${esc(e.branch)}" placeholder="যেমন: Madaripur Branch"></div>
    <div class="form-field"><label>শাখা কোড</label><input id="f_code" value="${esc(e.branchCode)}" placeholder="যেমন: 1234 (ঐচ্ছিক)"></div>
    <div class="form-field"><label>ফোন নম্বর *</label><input id="f_phone" value="${esc(e.phones.join(', '))}" placeholder="একাধিক হলে কমা দিয়ে লিখুন">
      <div class="hint">উদাহরণ: 01712345678, 01898765432</div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" id="cancelForm">বাতিল</button>
      <button class="btn-save" id="saveForm">${isEdit?'আপডেট করুন':'সংরক্ষণ করুন'}</button>
    </div>
  `;
  overlay.classList.add('show');

  sheet.querySelector('#cancelForm').addEventListener('click', ()=> overlay.classList.remove('show'));
  sheet.querySelector('#saveForm').addEventListener('click', ()=>{
    const pf = sheet.querySelector('#f_pf').value.trim();
    const name = sheet.querySelector('#f_name').value.trim();
    const desig = sheet.querySelector('#f_desig').value.trim();
    const branch = sheet.querySelector('#f_branch').value.trim();
    const branchCode = sheet.querySelector('#f_code').value.trim();
    const phoneRaw = sheet.querySelector('#f_phone').value.trim();
    if(!pf || !name || !desig || !branch || !phoneRaw){
      showToast('তারকা (*) চিহ্নিত ঘরগুলো পূরণ করুন'); return;
    }
    const phones = phoneRaw.split(',').map(p=>p.trim()).filter(Boolean);
    const newEmp = {
      id: isEdit ? e.id : ('NEW-'+pf+'-'+Date.now()),
      pf, name, desig, branch, branchCode, phones, district:'Madaripur'
    };
    if(isEdit){
      // if it's a base employee -> store as edit; if it's already a user-added one -> update in adds
      const addIdx = store.adds.findIndex(x=>x.id===e.id);
      if(addIdx>-1){ store.adds[addIdx] = newEmp; }
      else { store.edits[e.id] = newEmp; }
    } else {
      store.adds.push(newEmp);
    }
    saveStore(store);
    overlay.classList.remove('show');
    showToast(isEdit?'তথ্য আপডেট হয়েছে':'নতুন কর্মকর্তা যোগ হয়েছে');
    render();
  });
}

function confirmDelete(e){
  sheet.innerHTML = `
    <div class="confirm-box">
      <div style="font-size:2rem;">🗑️</div>
      <p><b>${esc(e.name)}</b>-কে তালিকা থেকে ডিলিট করতে চান?<br>এই কাজটি ফিরিয়ে নেওয়া যাবে না।</p>
      <div class="confirm-actions">
        <button class="btn-cancel" id="cancelDel">বাতিল</button>
        <button style="background:var(--danger); color:#fff;" id="okDel">ডিলিট করুন</button>
      </div>
    </div>
  `;
  sheet.querySelector('#cancelDel').addEventListener('click', ()=> openViewSheet(e));
  sheet.querySelector('#okDel').addEventListener('click', ()=>{
    store.deletes.push(e.id);
    saveStore(store);
    overlay.classList.remove('show');
    showToast('ডিলিট করা হয়েছে');
    render();
  });
}

overlay.addEventListener('click', (ev)=>{ if(ev.target===overlay) overlay.classList.remove('show'); });

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'), 1800);
}

searchInput.addEventListener('input', ()=>{
  state.query = searchInput.value.trim();
  clearBtn.style.display = state.query ? 'flex' : 'none';
  render();
});
clearBtn.addEventListener('click', ()=>{
  searchInput.value=''; state.query=''; clearBtn.style.display='none'; render();
});
groupToggle.addEventListener('click', ()=>{ state.grouped = !state.grouped; render(); });
document.getElementById('fabAdd').addEventListener('click', ()=> openFormSheet(null));

let dark = false;
document.getElementById('themeToggle').addEventListener('click', ()=>{
  dark = !dark;
  document.body.setAttribute('data-theme', dark ? 'dark':'light');
});

(function setupManifest(){
  const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" rx="40" fill="#0b3d33"/>
    <circle cx="100" cy="95" r="55" fill="#c99a3f"/>
    <text x="100" y="115" font-size="60" text-anchor="middle" fill="#241c07" font-family="sans-serif" font-weight="700">কৃ</text>
  </svg>`;
  const iconUri = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
  const manifest = {
    name: "বাংলাদেশ কৃষি ব্যাংক, মাদারীপুর ডিরেক্টরি",
    short_name: "কৃষি ব্যাংক মাদারীপুর",
    start_url: ".",
    display: "standalone",
    background_color: "#0b3d33",
    theme_color: "#0d5c4d",
    icons: [
      {src: iconUri, sizes:"any", type:"image/svg+xml", purpose:"any maskable"}
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('manifestLink').href = URL.createObjectURL(blob);
})();

// ---------- install prompt handling ----------
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (ev)=>{
  ev.preventDefault();
  deferredPrompt = ev;
  installBtn.style.display = 'flex';
});
installBtn.addEventListener('click', async ()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  } else {
    showManualInstallSheet();
  }
});
function showManualInstallSheet(){
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">📲 ফোনে ইনস্টল করবেন যেভাবে</div>
    <div style="font-size:.9rem; line-height:1.7;">
      <p><b>যদি ফাইলটা সরাসরি (file://) খুলে থাকেন:</b><br>
      Chrome-এর ⋮ মেনুতে <b>"Add to Home screen"</b> অপশনটি শুধু শর্টকাট আইকন হিসেবে যোগ হবে, পূর্ণাঙ্গ "Install app" প্রম্পট আসবে না — কারণ Chrome-এর install ফিচার শুধু https ঠিকানায় হোস্ট করা পেজেই কাজ করে।</p>
      <p><b>পূর্ণাঙ্গ ইনস্টলযোগ্য অ্যাপ বানাতে চাইলে:</b><br>
      ফাইলটি বিনামূল্যে <b>netlify.com/drop</b>-এ ড্র্যাগ-ড্রপ করে আপলোড করুন। এতে একটা https লিংক পাবেন। সেই লিংক ফোনের Chrome-এ খুললে ⋮ মেনুতে আসল <b>"Install app"</b> অপশন দেখা যাবে এবং পুরোপুরি নেটিভ অ্যাপের মতো ইনস্টল হবে।</p>
      <p><b>এখনই শর্টকাট বানাতে চাইলে:</b><br>
      Chrome-এ ফাইলটি খোলা অবস্থায় ডান পাশের ⋮ (তিনটি ডট) মেনুতে ট্যাপ করুন → নিচের দিকে স্ক্রল করুন → <b>"Add to Home screen"</b> খুঁজে নিন। এটা ফাইল ম্যানেজারের প্রিভিউ দিয়ে খুললে দেখা যায় না — Chrome অ্যাপ থেকেই খুলতে হবে।</p>
    </div>
    <div class="form-actions"><button class="btn-save" id="closeInstallInfo" style="width:100%;">বুঝেছি</button></div>
  `;
  overlay.classList.add('show');
  sheet.querySelector('#closeInstallInfo').addEventListener('click', ()=> overlay.classList.remove('show'));
}

// show install button always as a manual-help entry point too (in case beforeinstallprompt never fires)
setTimeout(()=>{ if(!deferredPrompt) installBtn.style.display='flex'; }, 1200);

render();
</script>
</body>
</html>
